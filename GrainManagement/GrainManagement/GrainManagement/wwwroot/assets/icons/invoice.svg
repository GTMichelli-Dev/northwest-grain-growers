<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Document outline: left, bottom, right sides -->
  <rect x="4"  y="4"  width="4"  height="56" rx="2"/> <!-- left -->
  <rect x="4"  y="56" width="56" height="4"  rx="2"/> <!-- bottom -->
  <rect x="56" y="16" width="4"  height="44" rx="2"/> <!-- right (starts below fold) -->

  <!-- Top bar up to fold -->
  <rect x="4" y="4" width="40" height="4" rx="2"/> <!-- top (stops before fold) -->

  <!-- Folded corner: two bars forming an L -->
  <rect x="40" y="4"  width="4" height="16" rx="2"/> <!-- fold vertical -->
  <rect x="40" y="16" width="20" height="4"  rx="2"/> <!-- fold horizontal -->

  <!-- Content lines -->
  <rect x="13" y="27" width="38" height="4" rx="2"/>
  <rect x="13" y="36" width="38" height="4" rx="2"/>
  <rect x="13" y="45" width="26" height="4" rx="2"/>
</svg>
