<svg viewBox="0 0 80 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Truck cab -->
  <rect x="4" y="20" width="22" height="16" rx="2"
        fill="none" stroke="currentColor" stroke-width="3"/>
  <path d="M26 24h7l5 5v7H26z"
        fill="none" stroke="currentColor" stroke-width="3"/>

  <!-- Wheels -->
  <circle cx="12" cy="40" r="4"
          fill="none" stroke="currentColor" stroke-width="3"/>
  <circle cx="33" cy="40" r="4"
          fill="none" stroke="currentColor" stroke-width="3"/>

  <!-- F.O.B. badge (circle with $) -->
  <circle cx="58" cy="24" r="14"
          fill="none" stroke="currentColor" stroke-width="3"/>
  <text x="58" y="30" text-anchor="middle"
        font-family="Arial,sans-serif" font-weight="bold" font-size="20"
        fill="currentColor">$</text>

  <!-- Arrow (flow →) -->
  <line x1="10" y1="56" x2="68" y2="56"
        stroke="currentColor" stroke-width="3"
        stroke-linecap="round"/>
  <path d="M60 50l8 6-8 6"
        fill="none" stroke="currentColor" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
