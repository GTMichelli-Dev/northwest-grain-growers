  <rect x="11" y="22" width="6" height="6" rx="1"/>
  <rect x="11" y="32" width="6" height="6" rx="1"/>
  <rect x="11" y="42" width="6" height="6" rx="1"/>

  <!-- Right elevator -->
  <path d="M44 14l6-6 6 6v42H44V14z"/>
  <rect x="47" y="22" width="6" height="6" rx="1"/>
  <rect x="47" y="32" width="6" height="6" rx="1"/>
  <rect x="47" y="42" width="6" height="6" rx="1"/>

  <!-- Grain truck -->
  <rect x="21" y="40" width="20" height="8" rx="2"/>
  <path d="M38 40h7l4 4v4h-4v-3h-3v3h-4z"/>
  <circle cx="26" cy="50" r="3"/>
  <circle cx="36" cy="50" r="3"/>
