<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer border: four filled bars forming a rectangle frame -->
  <rect x="4"  y="4"  width="56" height="4"  rx="2"/> <!-- top -->
  <rect x="4"  y="56" width="56" height="4"  rx="2"/> <!-- bottom -->
  <rect x="4"  y="4"  width="4"  height="56" rx="2"/> <!-- left -->
  <rect x="56" y="4"  width="4"  height="56" rx="2"/> <!-- right -->

  <!-- Header row divider (slightly thicker) -->
  <rect x="4" y="18" width="56" height="4"/>

  <!-- Interior row dividers -->
  <rect x="4" y="31" width="56" height="3"/>
  <rect x="4" y="43" width="56" height="3"/>

  <!-- Column dividers -->
  <rect x="21" y="4" width="3" height="56"/>
  <rect x="40" y="4" width="3" height="56"/>
</svg>
