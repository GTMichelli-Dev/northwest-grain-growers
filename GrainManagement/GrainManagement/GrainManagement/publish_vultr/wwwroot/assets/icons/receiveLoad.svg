<svg viewBox="0 0 80 64" xmlns="http://www.w3.org/2000/svg">

  <!-- Truck (slightly smaller) -->
  <rect x="6" y="22" width="24" height="16" rx="2"
        fill="none" stroke="currentColor" stroke-width="3"/>
  <path d="M30 26h8l6 6v6H30z"
        fill="none" stroke="currentColor" stroke-width="3"/>

  <!-- Wheels -->
  <circle cx="15" cy="42" r="4.5"
          fill="none" stroke="currentColor" stroke-width="3"/>
  <circle cx="38" cy="42" r="4.5"
          fill="none" stroke="currentColor" stroke-width="3"/>

  <!-- Grain Bin (moved RIGHT so it clears truck completely) -->

  <!-- top ellipse -->
  <ellipse cx="60" cy="20" rx="8" ry="3"
           fill="none" stroke="currentColor" stroke-width="3"/>

  <!-- sides -->
  <path d="M52 20v20c0 2 3.5 4 8 4s8-2 8-4V20"
        fill="none" stroke="currentColor" stroke-width="3"
        stroke-linejoin="round"/>

  <!-- bottom arc -->
  <path d="M52 40c0 2 3.5 4 8 4s8-2 8-4"
        fill="none" stroke="currentColor" stroke-width="3"
        stroke-linecap="round"/>

  <!-- Arrow UNDER (Outbound) -->
  <line x1="12" y1="58" x2="70" y2="58"
        stroke="currentColor" stroke-width="3"
        stroke-linecap="round"/>
  <path d="M62 52l8 6-8 6"
        fill="none" stroke="currentColor" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>

</svg>
